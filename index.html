<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Action Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f060;
    --text: #e8e8e8;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  header {
    padding: 24px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .date-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }

  h1 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 24px 24px 10px;
  }

  .input-area {
    flex: 1;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 300;
    line-height: 1.6;
    padding: 16px;
    resize: none;
    outline: none;
    min-height: 140px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  textarea::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    line-height: 1.7;
    background: var(--surface);
    border-radius: 8px;
    padding: 12px 14px;
    border-left: 2px solid var(--border);
  }

  .hint span {
    color: var(--accent);
  }

  .actions {
    padding: 20px 24px 40px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  button {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f0f0f;
  }

  .btn-primary:active {
    transform: scale(0.98);
    background: #b0d840;
  }

  .btn-primary:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 13px;
  }

  .btn-secondary:active {
    background: var(--border);
  }

  .preview {
    margin: 0 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: none;
  }

  .preview.visible {
    display: block;
  }

  .preview-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .preview-items {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .preview-item {
    font-size: 14px;
    color: var(--text);
    font-weight: 300;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .preview-item::before {
    content: '–';
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 24px 0;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #0f0f0f;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<header>
  <div class="date-label" id="dateLabel"></div>
  <h1>Raw Log</h1>
</header>

<div class="section-label">→ ## Raw · WHLSNDFLS</div>

<div class="divider"></div>

<div class="input-area" style="margin-top:16px;">
  <textarea id="input" placeholder="Write freely. Action / Perception / Thought…" rows="6"></textarea>

  <div class="hint">
    <span>Action</span> / <span>Perception</span> / <span>Thought</span><br>
    それぞれ最低1回含むと◎ · 4–7 sentences
  </div>
</div>

<div class="preview" id="preview">
  <div class="preview-title">Preview</div>
  <div class="preview-items" id="previewItems"></div>
</div>

<div class="actions">
  <button class="btn-primary" id="sendBtn" disabled onclick="openInObsidian()">
    Add to Obsidian
  </button>
  <button class="btn-secondary" onclick="clearInput()">Clear</button>
</div>

<div class="toast" id="toast">Opening Obsidian…</div>

<script>
  const VAULT = 'WHLSNDFLS';

  function getToday() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function formatDateLabel(dateStr) {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const d = new Date(dateStr + 'T00:00:00');
    return `${dateStr} · ${days[d.getDay()]}`;
  }

  const dateStr = getToday();
  document.getElementById('dateLabel').textContent = formatDateLabel(dateStr);

  const textarea = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const preview = document.getElementById('preview');
  const previewItems = document.getElementById('previewItems');

  textarea.addEventListener('input', () => {
    const val = textarea.value.trim();
    sendBtn.disabled = val.length === 0;

    if (val.length > 0) {
      const lines = val.split('\n').filter(l => l.trim());
      previewItems.innerHTML = lines.map(l =>
        `<div class="preview-item">${escapeHtml(l.trim())}</div>`
      ).join('');
      preview.classList.add('visible');
    } else {
      preview.classList.remove('visible');
    }
  });

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function openInObsidian() {
    const val = textarea.value.trim();
    if (!val) return;

    const lines = val.split('\n').filter(l => l.trim());
    const bullets = lines.map(l => `- ${l.trim()}`).join('\n');
    const data = encodeURIComponent('\n' + bullets);
    const filepath = encodeURIComponent(dateStr);
    const heading = encodeURIComponent('Raw');

    const uri = `obsidian://advanced-uri?vault=${encodeURIComponent(VAULT)}&filepath=${filepath}&heading=${heading}&data=${data}&mode=append`;

    showToast();
    window.location.href = uri;
  }

  function clearInput() {
    textarea.value = '';
    sendBtn.disabled = true;
    preview.classList.remove('visible');
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
